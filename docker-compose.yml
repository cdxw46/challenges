services:
  neurova:
    image: rust:1.83-bookworm
    working_dir: /workspace
    environment:
      NEUROVA_RUNTIME_DIR: /data/runtime
      NEUROVA_HTTP_PORT: 8080
      NEUROVA_MQTT_PORT: 1883
      NEUROVA_AMQP_PORT: 5672
      NEUROVA_TCP_PORT: 9100
      NEUROVA_UDP_PORT: 9101
      RUST_LOG: info
      CARGO_HOME: /cargo
    ports:
      - "8080:8080"
      - "1883:1883"
      - "5672:5672"
      - "9100:9100"
      - "9101:9101/udp"
    volumes:
      - .:/workspace
      - neurova_data:/data/runtime
      - cargo_cache:/cargo
      - target_cache:/workspace/target
    command: ["bash", "-lc", "cargo run --release -- serve"]
    restart: unless-stopped

  neurova-sim:
    image: rust:1.83-bookworm
    working_dir: /workspace
    depends_on:
      - neurova
    environment:
      NEUROVA_RUNTIME_DIR: /data/runtime
      NEUROVA_UDP_HOST: neurova
      NEUROVA_UDP_PORT: 9101
      RUST_LOG: info
      CARGO_HOME: /cargo
    volumes:
      - .:/workspace
      - neurova_data:/data/runtime
      - cargo_cache:/cargo
      - target_cache:/workspace/target
    command: ["bash", "-lc", "cargo run --release -- simulate --sensors 5000"]
    restart: unless-stopped

volumes:
  neurova_data:
  cargo_cache:
  target_cache:
