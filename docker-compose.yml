version: "3.8"

services:
  orchestrator:
    image: python:3.12-slim
    restart: unless-stopped
    working_dir: /app
    environment:
      PYTHONPATH: /app
      NEUROVA_DATA: /app/neurova/data
      NEUROVA_API_PORT: "8443"
      NEUROVA_MQTT_PORT: "18830"
      NEUROVA_BROKER_HTTP_PORT: "18080"
      NEUROVA_AMQP_PORT: "18672"
    volumes:
      - .:/app
      - neurova-data:/app/neurova/data
      - neurova-logs:/app/neurova/logs
    command: ["python", "-m", "neurova.api.orchestrator"]
    ports:
      - "8443:8443"
      - "18830:18830"
      - "18080:18080"
      - "18672:18672"

  simulator:
    image: python:3.12-slim
    restart: unless-stopped
    depends_on:
      - orchestrator
    working_dir: /app
    environment:
      PYTHONPATH: /app
      NEUROVA_MQTT_HOST: orchestrator
      NEUROVA_MQTT_PORT: "18830"
      NEUROVA_SIM_HZ: "0.2"
    volumes:
      - .:/app
    command: ["sh", "-c", "sleep 6 && python -m neurova.simulator.service"]

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - orchestrator
    volumes:
      - ./neurova/ops/nginx-neurova.conf:/etc/nginx/nginx.conf:ro
      - ./neurova/tls:/workspace/neurova/tls:ro
      - neurova-logs:/workspace/neurova/logs
    ports:
      - "80:80"
      - "443:443"

volumes:
  neurova-data:
  neurova-logs:
