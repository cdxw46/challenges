services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: smurfx
      POSTGRES_USER: smurfx
      POSTGRES_PASSWORD: smurfx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://smurfx:smurfx@db:5432/smurfx?schema=public
      JWT_SECRET: change-me-in-docker
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      ADMIN_EMAIL: admin@smurfx.com
      ADMIN_PASSWORD: Admin1234!
    ports:
      - "3000:3000"

volumes:
  postgres_data:
