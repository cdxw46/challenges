{% extends "base.html" %}
{% block title %}Transferir — Smurf Bank{% endblock %}
{% block content %}
<div class="max-w-lg mx-auto bg-white border border-smurf-200 rounded-2xl shadow p-6">
  <h1 class="text-2xl font-bold">Transferir smurfberries</h1>
  <p class="text-sm text-smurf-700/80 mt-1">Saldo disponible: <strong>{{ '{:,}'.format(g.user.balance) }} SB</strong></p>
  <form method="post" class="mt-5 space-y-4">
    <div>
      <label class="text-sm font-semibold">Destinatario (usuario)</label>
      <input name="target" required
        class="mt-1 w-full px-3 py-2 rounded-lg border border-smurf-200 focus:border-smurf-500 focus:ring focus:ring-smurf-200 outline-none" />
    </div>
    <div>
      <label class="text-sm font-semibold">Cantidad (SB)</label>
      <input name="amount" type="number" min="1" required
        class="mt-1 w-full px-3 py-2 rounded-lg border border-smurf-200 focus:border-smurf-500 focus:ring focus:ring-smurf-200 outline-none" />
    </div>
    <div>
      <label class="text-sm font-semibold">Nota (opcional)</label>
      <input name="note" maxlength="140"
        class="mt-1 w-full px-3 py-2 rounded-lg border border-smurf-200 focus:border-smurf-500 focus:ring focus:ring-smurf-200 outline-none" />
    </div>
    <button class="w-full py-2.5 rounded-lg bg-smurf-600 text-white font-semibold hover:bg-smurf-700">Enviar</button>
  </form>
</div>
{% endblock %}
