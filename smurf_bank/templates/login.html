{% extends "base.html" %}
{% block title %}Login — Smurf Bank{% endblock %}
{% block content %}
<div class="max-w-md mx-auto mt-6 bg-white border border-smurf-200 rounded-2xl shadow p-6">
  <h1 class="text-2xl font-bold text-center">Inicia sesión</h1>
  <p class="text-center text-sm text-smurf-700/80 mt-1">Bienvenido a la Aldea Pitufa.</p>
  <form method="post" class="mt-5 space-y-4">
    <div>
      <label class="text-sm font-semibold">Usuario</label>
      <input name="username" required autofocus
        class="mt-1 w-full px-3 py-2 rounded-lg border border-smurf-200 focus:border-smurf-500 focus:ring focus:ring-smurf-200 outline-none" />
    </div>
    <div>
      <label class="text-sm font-semibold">Contraseña</label>
      <input name="password" type="password" required
        class="mt-1 w-full px-3 py-2 rounded-lg border border-smurf-200 focus:border-smurf-500 focus:ring focus:ring-smurf-200 outline-none" />
    </div>
    <button class="w-full py-2.5 rounded-lg bg-smurf-600 text-white font-semibold hover:bg-smurf-700">Entrar</button>
  </form>
  <p class="mt-4 text-sm text-center">¿Sin cuenta? <a href="{{ url_for('register') }}" class="text-smurf-600 font-semibold">Regístrate</a></p>
</div>
{% endblock %}
