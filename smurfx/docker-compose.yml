version: '3.8'

services:
  # Base de Datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: smurfx_db
    restart: always
    environment:
      POSTGRES_USER: smurfx_user
      POSTGRES_PASSWORD: smurfx_password
      POSTGRES_DB: smurfx
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - smurfx_network

  # Caché Redis
  redis:
    image: redis:7-alpine
    container_name: smurfx_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    networks:
      - smurfx_network

  # Backend API (Node.js/Express o NestJS)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: smurfx_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://smurfx_user:smurfx_password@db:5432/smurfx
      - REDIS_URL=redis://redis:6379
      - PORT=4000
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - smurfx_network

  # Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: smurfx_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - smurfx_network

  # Panel de Administración (Next.js o React)
  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    container_name: smurfx_admin
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api/v1
    depends_on:
      - backend
    volumes:
      - ./admin:/app
      - /app/node_modules
    networks:
      - smurfx_network

volumes:
  pgdata:
  redisdata:

networks:
  smurfx_network:
    driver: bridge
